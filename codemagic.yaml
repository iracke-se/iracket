workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.iracket.app"
    scripts:
      - name: Pre-build
        script: |
          cd flutter-app
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Build AAB
        script: |
          cd flutter-app
          flutter build appbundle --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER
    artifacts:
      - flutter-app/build/**/outputs/bundle/**/*.aab
      - flutter-app/build/**/outputs/apk/**/*.apk
      - flutter-app/build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - andrej.gosevski03@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.iracket.app
      vars:
        BUNDLE_ID: "com.iracket.app"
        APP_STORE_APPLE_ID: 0000000000
    scripts:
      - name: Pre-build
        script: |
          cd flutter-app
          flutter pub get
          flutter pub run flutter_launcher_icons
      - name: Install pods
        script: |
          cd flutter-app/ios
          pod install
      - name: Set build number
        script: |
          cd flutter-app/ios
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          cd flutter-app
          flutter build ipa --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$(($BUILD_NUMBER + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter-app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter-app/flutter_drive.log
    publishing:
      email:
        recipients:
          - andrej.gosevski03@gmail.com
        notify:
          success: true
          failure: true
